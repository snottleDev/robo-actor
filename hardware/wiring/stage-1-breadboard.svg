<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 570"
     font-family="Arial, Helvetica, sans-serif">

  <!-- ══════════════════════════════════════════════════════
       ROBO-ACTOR — Stage 1 Wiring Diagram
       FireBeetle 2 ESP32-E + PCA9685 + MG90S Servo
  ═══════════════════════════════════════════════════════════ -->

  <!-- Background -->
  <rect width="900" height="570" fill="#f4f4f4" rx="6"/>

  <!-- ── Title bar ── -->
  <rect x="10" y="10" width="880" height="42" fill="#1a237e" rx="4"/>
  <text x="450" y="36" font-size="14" fill="white" text-anchor="middle" font-weight="bold">
    Stage 1 Wiring — DFRobot FireBeetle 2 ESP32-E · PCA9685 · MG90S Servo
  </text>

  <!-- ══════════════════════════════════════════════════════
       POWER SOURCE 1  —  USB-C to FireBeetle (logic)
  ═══════════════════════════════════════════════════════════ -->
  <text x="106" y="56" font-size="8.5" fill="#555" text-anchor="middle">Computer / Power Bank #1</text>
  <line x1="106" y1="60" x2="106" y2="68" stroke="#555" stroke-width="1.5"/>
  <polygon points="106,68 101,60 111,60" fill="#555"/>

  <!-- ══════════════════════════════════════════════════════
       FIREBEETLE 2 ESP32-E
  ═══════════════════════════════════════════════════════════ -->
  <rect x="22" y="68" width="168" height="286" fill="#e8eaf6" stroke="#283593" stroke-width="2" rx="4"/>
  <rect x="22" y="68" width="168" height="26" fill="#283593" rx="4"/>
  <text x="106" y="86" font-size="11" fill="white" text-anchor="middle" font-weight="bold">FireBeetle 2 ESP32-E</text>
  <text x="106" y="210" font-size="8.5" fill="#555" text-anchor="middle">SDA = GPIO 21</text>
  <text x="106" y="222" font-size="8.5" fill="#555" text-anchor="middle">SCL = GPIO 22</text>
  <text x="106" y="250" font-size="8.5" fill="#555" text-anchor="middle">Powered via USB-C</text>
  <text x="106" y="262" font-size="8.5" fill="#555" text-anchor="middle">(logic power only)</text>

  <!-- FireBeetle right-side pins (connection dots at x=192) -->
  <!-- 3.3V at y=140 -->
  <circle cx="192" cy="140" r="5" fill="#e53935" stroke="white" stroke-width="1.2"/>
  <text x="180" y="136" font-size="9" fill="#c62828" text-anchor="end">3.3V</text>

  <!-- GND at y=188 -->
  <circle cx="192" cy="188" r="5" fill="#424242" stroke="white" stroke-width="1.2"/>
  <text x="180" y="184" font-size="9" fill="#333" text-anchor="end">GND</text>

  <!-- GPIO21 / SDA at y=240 -->
  <circle cx="192" cy="240" r="5" fill="#1565c0" stroke="white" stroke-width="1.2"/>
  <text x="180" y="235" font-size="9" fill="#1565c0" text-anchor="end">GPIO 21</text>
  <text x="180" y="247" font-size="9" fill="#1565c0" text-anchor="end">SDA</text>

  <!-- GPIO22 / SCL at y=298 -->
  <circle cx="192" cy="298" r="5" fill="#6a1b9a" stroke="white" stroke-width="1.2"/>
  <text x="180" y="293" font-size="9" fill="#6a1b9a" text-anchor="end">GPIO 22</text>
  <text x="180" y="305" font-size="9" fill="#6a1b9a" text-anchor="end">SCL</text>

  <!-- ══════════════════════════════════════════════════════
       PCA9685 SERVO DRIVER
  ═══════════════════════════════════════════════════════════ -->
  <rect x="332" y="68" width="198" height="286" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" rx="4"/>
  <rect x="332" y="68" width="198" height="26" fill="#6a1b9a" rx="4"/>
  <text x="431" y="86" font-size="11" fill="white" text-anchor="middle" font-weight="bold">PCA9685 Servo Driver</text>

  <!-- Divider between I2C side and servo output side -->
  <line x1="440" y1="98" x2="440" y2="344" stroke="#ce93d8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="390" y="110" font-size="8" fill="#7b1fa2" text-anchor="middle">I2C + Power</text>
  <text x="490" y="110" font-size="8" fill="#7b1fa2" text-anchor="middle">Servo Output</text>

  <!-- PCA9685 left-side pins (connection dots at x=330) -->
  <!-- VCC at y=140 -->
  <circle cx="330" cy="140" r="5" fill="#e53935" stroke="white" stroke-width="1.2"/>
  <text x="342" y="136" font-size="9" fill="#c62828">VCC</text>
  <text x="342" y="148" font-size="8" fill="#c62828">(3.3V logic)</text>

  <!-- GND at y=188 -->
  <circle cx="330" cy="188" r="5" fill="#424242" stroke="white" stroke-width="1.2"/>
  <text x="342" y="191" font-size="9" fill="#333">GND</text>

  <!-- SDA at y=240 -->
  <circle cx="330" cy="240" r="5" fill="#1565c0" stroke="white" stroke-width="1.2"/>
  <text x="342" y="243" font-size="9" fill="#1565c0">SDA</text>

  <!-- SCL at y=298 -->
  <circle cx="330" cy="298" r="5" fill="#6a1b9a" stroke="white" stroke-width="1.2"/>
  <text x="342" y="301" font-size="9" fill="#6a1b9a">SCL</text>

  <!-- PCA9685 servo power screw terminals (at bottom of box) -->
  <text x="390" y="336" font-size="8.5" fill="#e65100" text-anchor="middle">Screw Terminals — Servo Power</text>
  <circle cx="364" cy="348" r="5" fill="#f57c00" stroke="white" stroke-width="1.2"/>
  <text x="372" y="351" font-size="8.5" fill="#e65100">V+ (5V)</text>
  <circle cx="420" cy="348" r="5" fill="#424242" stroke="white" stroke-width="1.2"/>
  <text x="428" y="351" font-size="8.5" fill="#333">GND</text>

  <!-- PCA9685 right-side channel 0 output pins (connection dots at x=532) -->
  <text x="490" y="200" font-size="8.5" fill="#555" text-anchor="middle">Channel 0</text>

  <!-- ch0 PWM at y=218 -->
  <circle cx="532" cy="218" r="5" fill="#2e7d32" stroke="white" stroke-width="1.2"/>
  <text x="520" y="215" font-size="9" fill="#2e7d32" text-anchor="end">PWM</text>

  <!-- ch0 V+ at y=258 -->
  <circle cx="532" cy="258" r="5" fill="#c62828" stroke="white" stroke-width="1.2"/>
  <text x="520" y="255" font-size="9" fill="#c62828" text-anchor="end">V+</text>

  <!-- ch0 GND at y=298 -->
  <circle cx="532" cy="298" r="5" fill="#424242" stroke="white" stroke-width="1.2"/>
  <text x="520" y="295" font-size="9" fill="#333" text-anchor="end">GND</text>

  <!-- ══════════════════════════════════════════════════════
       MG90S SERVO
  ═══════════════════════════════════════════════════════════ -->
  <rect x="632" y="166" width="238" height="162" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" rx="4"/>
  <rect x="632" y="166" width="238" height="26" fill="#2e7d32" rx="4"/>
  <text x="751" y="184" font-size="11" fill="white" text-anchor="middle" font-weight="bold">MG90S Servo (Ch 0)</text>

  <!-- Servo left-side pins (connection dots at x=630) -->
  <!-- PWM signal at y=218 -->
  <circle cx="630" cy="218" r="5" fill="#2e7d32" stroke="white" stroke-width="1.2"/>
  <text x="642" y="213" font-size="9" fill="#2e7d32">PWM signal</text>
  <text x="642" y="225" font-size="8" fill="#888">(orange / yellow wire)</text>

  <!-- Power at y=258 -->
  <circle cx="630" cy="258" r="5" fill="#c62828" stroke="white" stroke-width="1.2"/>
  <text x="642" y="253" font-size="9" fill="#c62828">Power — 5V</text>
  <text x="642" y="265" font-size="8" fill="#888">(red wire)</text>

  <!-- GND at y=298 -->
  <circle cx="630" cy="298" r="5" fill="#424242" stroke="white" stroke-width="1.2"/>
  <text x="642" y="293" font-size="9" fill="#333">Ground</text>
  <text x="642" y="305" font-size="8" fill="#888">(brown / black wire)</text>

  <!-- ══════════════════════════════════════════════════════
       WIRES — FireBeetle to PCA9685 (I2C + logic power)
  ═══════════════════════════════════════════════════════════ -->
  <!-- 3.3V — red -->
  <line x1="197" y1="140" x2="325" y2="140" stroke="#e53935" stroke-width="2.5"/>
  <!-- GND — dark -->
  <line x1="197" y1="188" x2="325" y2="188" stroke="#424242" stroke-width="2.5"/>
  <!-- SDA — blue -->
  <line x1="197" y1="240" x2="325" y2="240" stroke="#1565c0" stroke-width="2.5"/>
  <!-- SCL — purple -->
  <line x1="197" y1="298" x2="325" y2="298" stroke="#6a1b9a" stroke-width="2.5"/>

  <!-- ══════════════════════════════════════════════════════
       WIRES — PCA9685 ch0 to MG90S
  ═══════════════════════════════════════════════════════════ -->
  <!-- PWM — green -->
  <line x1="537" y1="218" x2="625" y2="218" stroke="#2e7d32" stroke-width="2.5"/>
  <!-- V+ — dark red -->
  <line x1="537" y1="258" x2="625" y2="258" stroke="#c62828" stroke-width="2.5"/>
  <!-- GND — dark -->
  <line x1="537" y1="298" x2="625" y2="298" stroke="#424242" stroke-width="2.5"/>

  <!-- ══════════════════════════════════════════════════════
       WIRES — Power Bank #2 to PCA9685 screw terminals (dashed)
  ═══════════════════════════════════════════════════════════ -->
  <!-- 5V to V+ screw terminal -->
  <line x1="364" y1="353" x2="364" y2="432" stroke="#f57c00" stroke-width="2.5" stroke-dasharray="7,3"/>
  <!-- GND to GND screw terminal -->
  <line x1="420" y1="353" x2="420" y2="432" stroke="#424242" stroke-width="2.5" stroke-dasharray="7,3"/>

  <!-- ══════════════════════════════════════════════════════
       POWER BANK #2 BOX
  ═══════════════════════════════════════════════════════════ -->
  <rect x="298" y="432" width="270" height="54" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5" rx="4"/>
  <text x="433" y="452" font-size="10" fill="#e65100" text-anchor="middle" font-weight="bold">5V USB Power Bank #2 — Servo Power</text>
  <text x="433" y="466" font-size="8.5" fill="#777" text-anchor="middle">5V → V+  screw terminal     GND → GND  screw terminal</text>
  <text x="433" y="479" font-size="8.5" fill="#777" text-anchor="middle">Kept separate from FireBeetle logic supply</text>

  <!-- ══════════════════════════════════════════════════════
       LEGEND
  ═══════════════════════════════════════════════════════════ -->
  <rect x="632" y="352" width="238" height="190" fill="#fffde7" stroke="#f9a825" stroke-width="1.5" rx="4"/>
  <rect x="632" y="352" width="238" height="24" fill="#f9a825" rx="4"/>
  <text x="751" y="369" font-size="10.5" fill="white" text-anchor="middle" font-weight="bold">Wire Colour Key</text>

  <line x1="647" y1="391" x2="675" y2="391" stroke="#e53935" stroke-width="2.5"/>
  <text x="682" y="395" font-size="9" fill="#333">3.3V — logic power</text>

  <line x1="647" y1="409" x2="675" y2="409" stroke="#424242" stroke-width="2.5"/>
  <text x="682" y="413" font-size="9" fill="#333">GND — shared ground</text>

  <line x1="647" y1="427" x2="675" y2="427" stroke="#1565c0" stroke-width="2.5"/>
  <text x="682" y="431" font-size="9" fill="#333">I2C SDA (data)</text>

  <line x1="647" y1="445" x2="675" y2="445" stroke="#6a1b9a" stroke-width="2.5"/>
  <text x="682" y="449" font-size="9" fill="#333">I2C SCL (clock)</text>

  <line x1="647" y1="463" x2="675" y2="463" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="682" y="467" font-size="9" fill="#333">PWM signal (servo)</text>

  <line x1="647" y1="481" x2="675" y2="481" stroke="#c62828" stroke-width="2.5"/>
  <text x="682" y="485" font-size="9" fill="#333">5V servo power</text>

  <line x1="647" y1="499" x2="675" y2="499" stroke="#f57c00" stroke-width="2.5" stroke-dasharray="6,2"/>
  <text x="682" y="503" font-size="9" fill="#333">5V external (dashed)</text>

  <line x1="647" y1="517" x2="675" y2="517" stroke="#424242" stroke-width="2.5" stroke-dasharray="6,2"/>
  <text x="682" y="521" font-size="9" fill="#333">GND external (dashed)</text>

  <!-- ══════════════════════════════════════════════════════
       WARNING — DUAL RAIL NOTE
  ═══════════════════════════════════════════════════════════ -->
  <rect x="22" y="388" width="292" height="162" fill="#ffebee" stroke="#c62828" stroke-width="1.5" rx="4"/>
  <rect x="22" y="388" width="292" height="24" fill="#c62828" rx="4"/>
  <text x="168" y="404" font-size="10.5" fill="white" text-anchor="middle" font-weight="bold">⚠  Dual Power Rails — Important</text>
  <text x="36" y="424" font-size="9" fill="#333">FireBeetle: powered via USB-C (computer or</text>
  <text x="36" y="438" font-size="9" fill="#333">power bank #1). Provides 3.3V to PCA9685</text>
  <text x="36" y="452" font-size="9" fill="#333">VCC only — this is logic power, not servo power.</text>
  <text x="36" y="470" font-size="9" fill="#333">Servos: powered from a SEPARATE 5V source</text>
  <text x="36" y="484" font-size="9" fill="#333">(power bank #2) via PCA9685 V+ screw terminal.</text>
  <text x="36" y="498" font-size="9" fill="#b71c1c" font-weight="bold">Both GND wires must be connected to PCA9685.</text>
  <text x="36" y="512" font-size="9" fill="#333">PCA9685 GND is shared across all rails.</text>
  <text x="36" y="526" font-size="9" fill="#333">Never power servos from the FireBeetle 3.3V pin.</text>
  <text x="36" y="540" font-size="9" fill="#333">Remove servo from any mount before testing.</text>

</svg>
